name: Deploy Tableau Workbook

on:
  push:
    branches:
      - main

workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tableauserverclient requests

      - name: Deploy Workbook
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_PAT_NAME: ${{ secrets.TABLEAU_PAT_NAME }}
          TABLEAU_PAT_SECRET: ${{ secrets.TABLEAU_PAT_SECRET }}
        run: |
          python deploy.py

      - name: Upload Permission Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permission-snapshots
          path: |
            permissions_before.json
            permissions_after.json
          if-no-files-found: ignore
